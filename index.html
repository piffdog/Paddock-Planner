<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>Paddock Planner</title>

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">

<meta name="theme-color" content="#367C2B">
<meta name="apple-mobile-web-app-title" content="Paddock Planner">

<style>

:root{
--jd-green:#367C2B;
--bg:#f4f6f3;
--panel:#ffffff;
--border:#2f6c25;
--text:#1f2a1f;
--muted:#5b665b;
--radius:12px;
--shadow:0 2px 8px rgba(0,0,0,0.08);
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:var(--bg);
font-family:"Slabby Prices","Rockwell","Roboto Slab",serif;
color:var(--text);
}

.header{
background:var(--jd-green);
color:white;
text-align:center;
padding:14px;
font-size:1.6rem;
font-weight:bold;
box-shadow:var(--shadow);
}

.wrapper{
max-width:600px;
margin:auto;
padding:10px;
}

.panel{
background:white;
border:2px solid var(--border);
border-radius:var(--radius);
padding:12px;
margin-bottom:10px;
box-shadow:var(--shadow);
}

label{
font-weight:bold;
display:block;
margin:8px 0 4px;
}

input{
width:100%;
padding:10px;
font-size:1.1rem;
border-radius:8px;
border:1px solid #bbb;
}

select{
width:100%;
padding:10px;
font-size:1.05rem;
border-radius:8px;
border:1px solid #bbb;
}

.segmented{
display:flex;
border:2px solid #367C2B;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.segment{
flex:1;
padding:11px 8px;
text-align:center;
font-weight:bold;
cursor:pointer;
background:white;
color:#367C2B;
user-select:none;
}

.segment + .segment{
border-left:2px solid #367C2B;
}

.segment.active{
background:#367C2B;
color:white;
}

.gapline{
text-align:center;
font-size:1rem;
margin:8px 0;
font-weight:bold;
color:#367C2B;
min-height:24px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border:2px solid var(--border);
border-radius:var(--radius);
overflow:hidden;
font-size:0.95rem;
box-shadow:var(--shadow);
}

th{
background:#367C2B;
color:white;
padding:8px;
}

td{
padding:8px;
text-align:center;
border-top:1px solid #ddd;
}

tbody tr:nth-child(even){
background:#fafcf9;
}

.note{
font-size:0.85rem;
color:var(--muted);
margin-top:8px;
}

@media (max-width:430px){

.header{
font-size:1.45rem;
}

.wrapper{
padding:8px;
}

input,select{
font-size:1rem;
}

table{
font-size:0.9rem;
}

th,td{
padding:7px 4px;
}

}

</style>

</head>

<body>

<div class="header">Paddock Planner</div>

<div class="wrapper">

<div class="panel">

<label>Guidance line spacing based on</label>

<div class="segmented">
<div class="segment" id="seg40">40 footer</div>
<div class="segment" id="seg60">60 footer</div>
</div>

</div>

<div class="panel">

<label for="startLine">Start guidance line</label> <input id="startLine" type="text" placeholder="e.g. 10S" autocapitalize="characters">

<label for="finishLine">Finish guidance line</label> <input id="finishLine" type="text" placeholder="e.g. 24N" autocapitalize="characters">

<label for="r1type">40 footer finishes</label> <select id="r1type">

<option value="any">No preference</option>
<option value="even">Finish this end</option>
<option value="odd">Finish other end</option>
</select>

<label for="r2type">60 footer finishes</label> <select id="r2type">

<option value="any">No preference</option>
<option value="even">Finish this end</option>
<option value="odd">Finish other end</option>
</select>

</div>

<div class="gapline" id="gapline">Remaining gap: -</div>

<table>

<thead>
<tr>
<th>40 footer runs</th>
<th>60 footer runs</th>
<th>Total width (m)</th>
</tr>
</thead>

<tbody id="results"></tbody>

</table>

<div class="note">
40 footer = 12m. 60 footer = 18m. Finish this end = even runs.
</div>

</div>

<script>

const WIDTH_40 = 12;
const WIDTH_60 = 18;

let spacing = 12;

const seg40 = document.getElementById("seg40");
const seg60 = document.getElementById("seg60");

function setSpacing(value){

spacing=value;

localStorage.setItem("spacing",value);

seg40.classList.remove("active");
seg60.classList.remove("active");

if(value===12) seg40.classList.add("active");
if(value===18) seg60.classList.add("active");

calculate();

}

seg40.onclick=()=>setSpacing(12);
seg60.onclick=()=>setSpacing(18);

let saved=localStorage.getItem("spacing");

if(saved) setSpacing(parseFloat(saved));
else setSpacing(12);

function parseGuidance(v){

v=v.trim().toUpperCase();

let m=v.match(/^(\d+)([NSEW])$/);

if(!m) return null;

return {n:parseInt(m[1]),s:m[2]};

}

function getLines(a,b){

const opp={N:"S",S:"N",E:"W",W:"E"};

if(a.s===b.s) return Math.abs(b.n-a.n)+1;

if(opp[a.s]===b.s) return a.n+b.n+1;

return null;

}

function parity(v,type){

if(type==="any") return true;

if(type==="even") return v%2===0;

if(type==="odd") return v%2===1;

}

function calculate(){

let start=parseGuidance(document.getElementById("startLine").value);
let finish=parseGuidance(document.getElementById("finishLine").value);

let r1=document.getElementById("r1type").value;
let r2=document.getElementById("r2type").value;

let table=document.getElementById("results");
table.innerHTML="";

if(!start||!finish){

document.getElementById("gapline").innerText="Remaining gap: -";
return;

}

let lines=getLines(start,finish);

if(lines===null){

document.getElementById("gapline").innerText="Remaining gap: -";
return;

}

let gap=lines*spacing;

document.getElementById("gapline").innerText="Remaining gap: "+gap+"m";

for(let x=0;x<500;x++){

let rem=gap-x*WIDTH_40;

if(rem<0) break;

let y=rem/WIDTH_60;

if(Number.isInteger(y) && parity(x,r1) && parity(y,r2)){

let row=document.createElement("tr");

row.innerHTML="<td>"+x+"</td><td>"+y+"</td><td>"+(x*WIDTH_40+y*WIDTH_60)+"</td>";

table.appendChild(row);

}

}

}

document.querySelectorAll("input,select").forEach(el=>{

el.addEventListener("input",calculate);

});

</script>

</body>
</html>
