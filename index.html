<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paddock Planner</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-391.png">
<meta name="theme-color" content="#367C2B">

<style>
:root{
  --jd-green:#367C2B;
  --jd-green-dark:#2f6c25;
  --bg:#f4f6f3;
  --panel:#ffffff;
  --border:#2f6c25;
  --text:#1f2a1f;
  --muted:#5b665b;
  --radius:12px;
  --shadow:0 2px 8px rgba(0,0,0,0.08);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"Slabby Prices","Rockwell","Roboto Slab",serif;
  color:var(--text);
}

.header{
  background:var(--jd-green);
  color:white;
  text-align:center;
  padding:14px 12px;
  font-size:1.6rem;
  font-weight:bold;
  box-shadow:var(--shadow);
}

.wrapper{
  max-width:600px;
  margin:auto;
  padding:10px;
}

.panel{
  background:white;
  border:2px solid var(--border);
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:10px;
  box-shadow:var(--shadow);
}

label{
  font-weight:bold;
  display:block;
  margin:8px 0 4px;
  font-size:1rem;
}

input{
  width:100%;
  padding:10px 12px;
  min-height:48px;
  font-size:1.1rem;
  border-radius:8px;
  border:1px solid #bbb;
  background:white;
  color:var(--text);
  font-family:inherit;
}

select{
  width:100%;
  padding:10px 12px;
  min-height:48px;
  font-size:1.05rem;
  border-radius:8px;
  border:1px solid #bbb;
  background:white;
  color:var(--text);
  font-family:inherit;
}

input:focus, select:focus{
  outline:3px solid rgba(54,124,43,0.15);
  border-color:var(--jd-green);
}

.segmented{
  display:flex;
  border:2px solid var(--jd-green);
  border-radius:10px;
  overflow:hidden;
  margin-top:6px;
}

.segment{
  flex:1;
  padding:11px 8px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:var(--jd-green);
  user-select:none;
}

.segment + .segment{
  border-left:2px solid var(--jd-green);
}

.segment.active{
  background:var(--jd-green);
  color:white;
}

.gapline{
  text-align:center;
  font-size:1rem;
  margin:8px 0 10px;
  font-weight:bold;
  color:var(--jd-green);
  min-height:24px;
}

.table-wrap{
  background:white;
  border:2px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:0.95rem;
}

th{
  background:var(--jd-green);
  color:white;
  padding:9px 6px;
  text-align:center;
}

td{
  padding:9px 6px;
  text-align:center;
  border-top:1px solid #ddd;
}

tbody tr:nth-child(even){
  background:#fafcf9;
}

.note{
  font-size:0.85rem;
  color:var(--muted);
  margin-top:8px;
  line-height:1.35;
}

@media (max-width:430px){
  .header{
    font-size:1.45rem;
  }

  .wrapper{
    padding:8px;
  }

  input, select{
    font-size:1rem;
  }

  table{
    font-size:0.9rem;
  }

  th, td{
    padding:8px 4px;
  }
}
</style>
</head>

<body>

<div class="header">Paddock Planner</div>

<div class="wrapper">

  <div class="panel">
    <label>Guidance line spacing based on</label>
    <div class="segmented">
      <div class="segment" id="seg40">40 footer</div>
      <div class="segment" id="seg60">60 footer</div>
    </div>
  </div>

  <div class="panel">
    <label for="startLine">Start guidance line</label>
    <input id="startLine" type="text" placeholder="e.g. 10S" autocapitalize="characters">

    <label for="finishLine">Finish guidance line</label>
    <input id="finishLine" type="text" placeholder="e.g. 24N" autocapitalize="characters">

    <label for="r1type">40 footer finishes</label>
    <select id="r1type">
      <option value="any">No preference</option>
      <option value="even">Finish this end</option>
      <option value="odd">Finish other end</option>
    </select>

    <label for="r2type">60 footer finishes</label>
    <select id="r2type">
      <option value="any">No preference</option>
      <option value="even">Finish this end</option>
      <option value="odd">Finish other end</option>
    </select>
  </div>

  <div class="gapline" id="gapline">Remaining gap: -</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>40 footer runs</th>
          <th>60 footer runs</th>
          <th>Total width (m)</th>
        </tr>
      </thead>
      <tbody id="results"></tbody>
    </table>
  </div>

  <div class="note">
    40 footer = 12m. 60 footer = 18m. Finish this end = even runs. Finish other end = odd runs.
  </div>

</div>

<script>
const WIDTH_40 = 12;
const WIDTH_60 = 18;

let spacing = 12;

const seg40 = document.getElementById("seg40");
const seg60 = document.getElementById("seg60");

function setSpacing(value){
  spacing = value;
  localStorage.setItem("spacing", value);

  seg40.classList.remove("active");
  seg60.classList.remove("active");

  if(value === 12) seg40.classList.add("active");
  if(value === 18) seg60.classList.add("active");

  calculate();
}

seg40.onclick = () => setSpacing(12);
seg60.onclick = () => setSpacing(18);

const saved = localStorage.getItem("spacing");
if(saved){
  setSpacing(parseFloat(saved));
}else{
  setSpacing(12);
}

function parseGuidance(value){
  value = String(value || "").trim().toUpperCase();
  const match = value.match(/^(\d+)\s*([NSEW])$/);

  if(!match) return null;

  return {
    n: parseInt(match[1], 10),
    s: match[2]
  };
}

function getLines(a, b){
  const opposite = { N:"S", S:"N", E:"W", W:"E" };

  if(a.s === b.s){
    return Math.abs(b.n - a.n) + 1;
  }

  if(opposite[a.s] === b.s){
    return a.n + b.n + 1;
  }

  return null;
}

function parity(value, type){
  if(type === "any") return true;
  if(type === "even") return value % 2 === 0;
  if(type === "odd") return value % 2 === 1;
  return true;
}

function calculate(){
  const start = parseGuidance(document.getElementById("startLine").value);
  const finish = parseGuidance(document.getElementById("finishLine").value);
  const r1 = document.getElementById("r1type").value;
  const r2 = document.getElementById("r2type").value;
  const table = document.getElementById("results");

  table.innerHTML = "";

  if(!start || !finish){
    document.getElementById("gapline").innerText = "Remaining gap: -";
    return;
  }

  const lines = getLines(start, finish);

  if(lines === null){
    document.getElementById("gapline").innerText = "Remaining gap: -";
    return;
  }

  const gap = lines * spacing;
  document.getElementById("gapline").innerText = "Remaining gap: " + gap + "m";

  let found = false;

  for(let x = 0; x <= 500; x++){
    const rem = gap - (x * WIDTH_40);

    if(rem < 0) break;

    const y = rem / WIDTH_60;

    if(Number.isInteger(y) && y >= 0 && parity(x, r1) && parity(y, r2)){
      found = true;

      const row = document.createElement("tr");
      row.innerHTML =
        "<td>" + x + "</td>" +
        "<td>" + y + "</td>" +
        "<td>" + ((x * WIDTH_40) + (y * WIDTH_60)) + "</td>";

      table.appendChild(row);
    }
  }

  if(!found){
    const row = document.createElement("tr");
    row.innerHTML = "<td colspan='3'>No valid solutions</td>";
    table.appendChild(row);
  }
}

document.querySelectorAll("input,select").forEach(el => {
  el.addEventListener("input", calculate);
  el.addEventListener("change", calculate);
});

calculate();
</script>

</body>
</html>
